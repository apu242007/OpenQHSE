name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Next.js Static Export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Remove API routes incompatible with static export
        run: |
          rm -rf apps/web/src/app/api
          # Remove force-dynamic from layout.tsx (incompatible with output:export)
          sed -i "/export const dynamic = 'force-dynamic'/d" apps/web/src/app/layout.tsx
          # Replace dynamic next-intl server functions with static fallbacks
          sed -i "s/import { getLocale, getMessages } from 'next-intl\/server';//" apps/web/src/app/layout.tsx
          sed -i "s/const locale = await getLocale();/const locale = 'es';/" apps/web/src/app/layout.tsx
          sed -i "s/const messages = await getMessages();/const { default: messages } = await import('@\/i18n\/messages\/es.json');/" apps/web/src/app/layout.tsx
          # Add generateStaticParams to all dynamic route pages (required for output:export)
          find apps/web/src/app -path "*/\[*\]*/page.tsx" | while read f; do
            if ! grep -q "generateStaticParams" "$f"; then
              echo "" >> "$f"
              echo "export function generateStaticParams() { return []; }" >> "$f"
            fi
          done

      - name: Build static export
        working-directory: apps/web
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_API_URL: ""
          NEXTAUTH_URL: "https://apu242007.github.io/OpenQHSE"
          NEXTAUTH_SECRET: "github-pages-placeholder"
          NEXT_TELEMETRY_DISABLED: 1
        run: pnpm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
