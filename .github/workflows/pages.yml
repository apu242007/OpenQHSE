name: Deploy to GitHub Pages

"on":
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build Next.js Static Export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Remove API routes incompatible with static export
        run: rm -rf apps/web/src/app/api

      - name: Remove middleware (not compatible with static export)
        run: rm -f apps/web/src/middleware.ts

      - name: Remove dynamic detail routes (require live backend)
        run: find apps/web/src/app -type d -name '\[*\]' -exec rm -rf {} + 2>/dev/null || true

      - name: Build static export
        working-directory: apps/web
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_API_URL: ""
          NEXT_PUBLIC_DISABLE_AUTH: "true"
          AUTH_URL: "https://apu242007.github.io/OpenQHSE"
          NEXTAUTH_URL: "https://apu242007.github.io/OpenQHSE"
          NEXTAUTH_SECRET: "github-pages-placeholder"
          NEXT_TELEMETRY_DISABLED: 1
        run: pnpm run build

      - name: Disable Jekyll (allow _next/ directory)
        run: touch apps/web/out/.nojekyll

      - name: Create 404.html for SPA client-side routing
        run: cp apps/web/out/index.html apps/web/out/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
