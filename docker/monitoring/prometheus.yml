global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "openqhse-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "api"

  - job_name: "openqhse-ai-engine"
    metrics_path: /metrics
    static_configs:
      - targets: ["ai-engine:8001"]
        labels:
          service: "ai-engine"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: "postgres"

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: "redis"
