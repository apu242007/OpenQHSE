# OpenQHSE Platform — Docker Compose (base)
# Usage: docker compose up -d
# Override: docker-compose.override.yml (auto-loaded for dev)

x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-api-env: &api-env
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-openqhse}:${POSTGRES_PASSWORD:-openqhse_dev_2026}@postgres:5432/${POSTGRES_DB:-openqhse}
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  REDBEAT_REDIS_URL: redis://redis:6379/3
  MINIO_ENDPOINT: minio:9000
  MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
  MINIO_BUCKET: ${MINIO_BUCKET:-openqhse}
  MINIO_USE_SSL: "false"
  OLLAMA_BASE_URL: http://ollama:11434
  OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
  API_SECRET_KEY: ${API_SECRET_KEY:-change-this-to-a-random-secret-key-in-production}
  API_CORS_ORIGINS: ${API_CORS_ORIGINS:-http://localhost:3000,http://localhost:8081}
  SMTP_HOST: ${SMTP_HOST:-mailhog}
  SMTP_PORT: ${SMTP_PORT:-1025}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASS: ${SMTP_PASS:-}
  SMTP_FROM: ${SMTP_FROM:-noreply@openqhse.local}
  SENTRY_DSN: ${SENTRY_DSN:-}
  IS_PRODUCTION: ${IS_PRODUCTION:-false}
  AWS_REGION: ${AWS_REGION:-us-east-1}
  WHATSAPP_API_TOKEN: ${WHATSAPP_API_TOKEN:-}
  WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
  SLACK_WEBHOOK: ${SLACK_WEBHOOK:-}
  TEAMS_WEBHOOK: ${TEAMS_WEBHOOK:-}

services:
  # ── Databases & Caches ─────────────────────────────────────

  postgres:
    <<: *common
    image: postgres:17-alpine
    container_name: oq-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openqhse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openqhse_dev_2026}
      POSTGRES_DB: ${POSTGRES_DB:-openqhse}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-rls.sql:/docker-entrypoint-initdb.d/01-rls.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openqhse}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    <<: *common
    image: redis:7.4-alpine
    container_name: oq-redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass "${REDIS_PASSWORD:-}"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    <<: *common
    image: minio/minio:latest
    container_name: oq-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  minio-init:
    image: minio/mc:latest
    container_name: oq-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set oq http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
        mc mb --ignore-existing oq/openqhse;
        mc mb --ignore-existing oq/openqhse-public;
        mc anonymous set download oq/openqhse-public;
        echo 'MinIO buckets created successfully';
      "

  # ── AI ─────────────────────────────────────────────────────

  ollama:
    <<: *common
    image: ollama/ollama:latest
    container_name: oq-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/version"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        reservations:
          memory: 4G
          # ── GPU: descomenta si el host tiene NVIDIA + nvidia-container-toolkit ──
          # devices:
          #   - driver: nvidia
          #     count: 1
          #     capabilities: [gpu]
        limits:
          memory: 8G  # llama3.2 Q4 requiere ~4–5 GB; headroom para contextos largos

  ollama-init:
    image: ollama/ollama:0.5.4
    container_name: oq-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        ollama pull llama3.2 &&
        ollama pull nomic-embed-text &&
        echo 'Models ready'
      "
    environment:
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - ollamadata:/root/.ollama

  # ── Backend Services ───────────────────────────────────────

  api:
    <<: *common
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: oq-api
    environment:
      <<: *api-env
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ai-engine:
    <<: *common
    build:
      context: .
      dockerfile: docker/ai-engine.Dockerfile
    container_name: oq-ai-engine
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${AI_ENGINE_PORT:-8001}:8001"
    depends_on:
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    <<: *common
    build:
      context: .
      dockerfile: docker/celery.Dockerfile
    container_name: oq-celery-worker
    command: celery -A app.celery_app worker -l info -c 4 -Q default,notifications,reports,ai
    environment:
      <<: *api-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app

  celery-beat:
    <<: *common
    build:
      context: .
      dockerfile: docker/celery.Dockerfile
    container_name: oq-celery-beat
    # SIN --schedule: celery-redbeat usa Redis, no filesystem
    command: celery -A app.celery_app beat -l info
    environment:
      <<: *api-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app

  # ── Backup automatizado ────────────────────────────────────

  postgres-backup:
    <<: *common
    image: prodrigestivill/postgres-backup-local:17
    container_name: oq-postgres-backup
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-openqhse}
      POSTGRES_USER: ${POSTGRES_USER:-openqhse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openqhse_dev_2026}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 30
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy

  # ── Frontend ───────────────────────────────────────────────

  web:
    <<: *common
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: oq-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-this-to-a-random-nextauth-secret}
      API_URL: http://api:8000/api/v1
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  # ── Monitoring ─────────────────────────────────────────────

  prometheus:
    <<: *common
    image: prom/prometheus:v3.1.0
    container_name: oq-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus

  grafana:
    <<: *common
    image: grafana/grafana:11.4.0
    container_name: oq-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana

  # ── Reverse Proxy ──────────────────────────────────────────

  nginx:
    <<: *common
    image: nginx:1.27-alpine
    container_name: oq-nginx
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web

volumes:
  pgdata:
  redisdata:
  miniodata:
  ollamadata:
  prometheusdata:
  grafanadata:
