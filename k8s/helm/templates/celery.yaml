{{- if .Values.celery.worker.enabled }}
---
# ── Celery Worker Deployment ────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openqhse.fullname" . }}-celery-worker
  labels: {{- include "openqhse.labels" . | nindent 4 }}
    app.kubernetes.io/component: celery-worker
spec:
  replicas: {{ .Values.celery.worker.replicaCount }}
  selector:
    matchLabels: {{- include "openqhse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: celery-worker
  strategy: {{- toYaml .Values.celery.worker.strategy | nindent 4 }}
  template:
    metadata:
      labels: {{- include "openqhse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: celery-worker
      annotations: {{- toYaml .Values.celery.worker.podAnnotations | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "openqhse.serviceAccountName" . }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: celery-worker
          image: "{{ .Values.celery.worker.image.repository }}:{{ .Values.celery.worker.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.celery.worker.image.pullPolicy }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command:
            - celery
            - -A
            - app.celery_app
            - worker
            - --queues={{ .Values.celery.worker.queues }}
            - --concurrency={{ .Values.celery.worker.concurrency }}
            - --loglevel={{ .Values.celery.worker.loglevel }}
            - --max-tasks-per-child=100
          envFrom:
            - secretRef:
                name: {{ .Values.api.existingSecret | default (printf "%s-api-secrets" (include "openqhse.fullname" .)) }}
          resources: {{- toYaml .Values.celery.worker.resources | nindent 12 }}
          livenessProbe: {{- toYaml .Values.celery.worker.livenessProbe | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      nodeSelector: {{- toYaml .Values.celery.worker.nodeSelector | nindent 8 }}
      tolerations: {{- toYaml .Values.celery.worker.tolerations | nindent 8 }}
      affinity: {{- toYaml .Values.celery.worker.affinity | nindent 8 }}
{{- end }}

{{- if .Values.celery.beat.enabled }}
---
# ── Celery Beat StatefulSet ─────────────────────────────────
# StatefulSet (not Deployment) so there's always exactly 1 replica
# and the schedule DB persists across pod restarts.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "openqhse.fullname" . }}-celery-beat
  labels: {{- include "openqhse.labels" . | nindent 4 }}
    app.kubernetes.io/component: celery-beat
spec:
  replicas: 1
  serviceName: {{ include "openqhse.fullname" . }}-celery-beat
  selector:
    matchLabels: {{- include "openqhse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: celery-beat
  template:
    metadata:
      labels: {{- include "openqhse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: celery-beat
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "openqhse.serviceAccountName" . }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: celery-beat
          image: "{{ .Values.celery.beat.image.repository }}:{{ .Values.celery.beat.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.celery.beat.image.pullPolicy }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command:
            - celery
            - -A
            - app.celery_app
            - beat
            - --loglevel={{ .Values.celery.beat.loglevel }}
            - --scheduler=django_celery_beat.schedulers:DatabaseScheduler
            - --pidfile=/var/run/celerybeat.pid
          envFrom:
            - secretRef:
                name: {{ .Values.api.existingSecret | default (printf "%s-api-secrets" (include "openqhse.fullname" .)) }}
          resources: {{- toYaml .Values.celery.beat.resources | nindent 12 }}
          volumeMounts:
            - name: beat-data
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      nodeSelector: {{- toYaml .Values.celery.beat.nodeSelector | nindent 8 }}
      tolerations: {{- toYaml .Values.celery.beat.tolerations | nindent 8 }}
      affinity: {{- toYaml .Values.celery.beat.affinity | nindent 8 }}
  {{- if .Values.celery.beat.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: beat-data
      spec:
        accessModes: [{{ .Values.celery.beat.persistence.accessMode | quote }}]
        {{- if .Values.celery.beat.persistence.storageClass }}
        storageClassName: {{ .Values.celery.beat.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.celery.beat.persistence.size }}
  {{- end }}
{{- end }}

{{- if .Values.celery.flower.enabled }}
---
# ── Flower monitoring ───────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openqhse.fullname" . }}-flower
  labels: {{- include "openqhse.labels" . | nindent 4 }}
    app.kubernetes.io/component: flower
spec:
  replicas: 1
  selector:
    matchLabels: {{- include "openqhse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: flower
  template:
    metadata:
      labels: {{- include "openqhse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: flower
    spec:
      containers:
        - name: flower
          image: "{{ .Values.celery.flower.image.repository }}:{{ .Values.celery.flower.image.tag }}"
          ports:
            - containerPort: {{ .Values.celery.flower.service.port }}
          envFrom:
            - secretRef:
                name: {{ .Values.api.existingSecret | default (printf "%s-api-secrets" (include "openqhse.fullname" .)) }}
          resources: {{- toYaml .Values.celery.flower.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openqhse.fullname" . }}-flower
  labels: {{- include "openqhse.labels" . | nindent 4 }}
spec:
  selector: {{- include "openqhse.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: flower
  ports:
    - port: {{ .Values.celery.flower.service.port }}
      targetPort: {{ .Values.celery.flower.service.port }}
{{- end }}
