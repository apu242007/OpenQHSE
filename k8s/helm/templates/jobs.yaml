{{- if .Values.migrations.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "openqhse.fullname" . }}-migrate-{{ .Release.Revision }}
  labels: {{- include "openqhse.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrations
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  template:
    metadata:
      labels: {{- include "openqhse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrations
    spec:
      restartPolicy: {{ .Values.migrations.restartPolicy }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "openqhse.serviceAccountName" . }}
      containers:
        - name: migrate
          image: "{{ .Values.migrations.image.repository }}:{{ .Values.migrations.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.migrations.image.pullPolicy }}
          command:
            - alembic
            - -c
            - alembic.ini
            - upgrade
            - head
          envFrom:
            - secretRef:
                name: {{ .Values.api.existingSecret | default (printf "%s-api-secrets" (include "openqhse.fullname" .)) }}
          resources: {{- toYaml .Values.migrations.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}

{{- if .Values.seedMarketplace.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "openqhse.fullname" . }}-seed-marketplace
  labels: {{- include "openqhse.labels" . | nindent 4 }}
    app.kubernetes.io/component: seed-marketplace
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: {{ .Values.seedMarketplace.backoffLimit }}
  template:
    metadata:
      labels: {{- include "openqhse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: seed-marketplace
    spec:
      restartPolicy: {{ .Values.seedMarketplace.restartPolicy }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: seed-marketplace
          image: "{{ .Values.seedMarketplace.image.repository }}:{{ .Values.seedMarketplace.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.seedMarketplace.image.pullPolicy }}
          command: {{ toYaml .Values.seedMarketplace.args | nindent 12 }}
          envFrom:
            - secretRef:
                name: {{ .Values.api.existingSecret | default (printf "%s-api-secrets" (include "openqhse.fullname" .)) }}
          resources: {{- toYaml .Values.seedMarketplace.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
